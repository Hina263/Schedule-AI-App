<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>入力 - スケジュール</title>
  <style>
    :root {
      --main:      #4A90E2;
      --main-dark: #357ABD;
      --bg:        #F5F5F5;
      --white:     #FFFFFF;
      --text:      #333333;
      --sub:       #888888;
      --border:    #E0E0E0;
      --nav-h:     60px;
      --hdr-h:     54px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ========= ヘッダー ========= */
    .hdr {
      position: fixed; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: var(--hdr-h);
      background: var(--main);
      display: flex; align-items: center;
      padding: 0 16px;
      z-index: 200;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    .hdr h1 { font-size: 1.1rem; font-weight: 700; color: #fff; }

    /* ========= コンテンツ ========= */
    .content {
      padding-top: calc(var(--hdr-h) + 12px);
      padding-bottom: calc(var(--nav-h) + 20px);
      padding-left: 14px;
      padding-right: 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ========= カード ========= */
    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 20px 18px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }
    .card-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .card-icon {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; background: #dbeafe;
    }
    .card-title {
      font-size: 0.98rem; font-weight: 700; color: var(--text);
    }
    .card-desc {
      font-size: 0.78rem; color: var(--sub); margin-top: 1px;
    }

    /* ========= テキストエリア + マイク ========= */
    .input-wrap {
      position: relative;
    }
    textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 50px 12px 13px;
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      min-height: 90px;
      line-height: 1.55;
      outline: none;
      color: var(--text);
      transition: border-color .2s;
      background: #fafafa;
    }
    textarea:focus { border-color: var(--main); background: var(--white); }

    .mic-btn {
      position: absolute;
      bottom: 10px; right: 10px;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, box-shadow .15s;
      color: var(--sub);
    }
    .mic-btn:hover  { background: #e0e7ff; color: var(--main); }
    .mic-btn.active {
      background: #fee2e2;
      color: #dc2626;
      animation: pulse 1s infinite;
      box-shadow: 0 0 0 4px rgba(220,38,38,.15);
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 2px rgba(220,38,38,.2); }
      50%      { box-shadow: 0 0 0 6px rgba(220,38,38,.1); }
    }

    /* ========= ヒント ========= */
    .hint {
      font-size: 0.72rem; color: var(--sub);
      margin-top: 8px; line-height: 1.55;
    }
    .hint strong { color: #555; }
    .hint-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }
    .hint-chip {
      background: var(--bg);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.71rem;
      color: #555;
      line-height: 1.45;
    }
    .hint-chip .chip-label {
      font-weight: 700;
      font-size: 0.65rem;
      color: var(--sub);
      display: block;
      margin-bottom: 2px;
    }

    /* ========= ボタン ========= */
    .btn-primary {
      width: 100%; margin-top: 14px;
      padding: 13px;
      background: var(--main);
      color: #fff; border: none;
      border-radius: 10px;
      font-size: 0.92rem; font-weight: 700;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary:hover    { background: var(--main-dark); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

    /* ========= メッセージ ========= */
    .msg {
      font-size: 0.82rem;
      padding: 10px 13px;
      border-radius: 9px;
      margin-top: 10px;
      display: none;
      line-height: 1.5;
    }
    .msg.success { background: #dcfce7; color: #166534; display: block; }
    .msg.error   { background: #fee2e2; color: #991b1b; display: block; }
    .msg.warning { background: #fef3c7; color: #92400e; display: block; }
    .msg.loading { background: #e0e7ff; color: #3730a3; display: block; }
    .msg.info    { background: #f0f9ff; color: #0369a1; display: block; }

    /* ========= スピナー ========= */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.5);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    .spinner.dark {
      border-color: rgba(55,48,163,.3);
      border-top-color: #3730a3;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========= Warning 確認ボタン ========= */
    .warn-item { margin-bottom: 6px; }
    .warn-btns { display: flex; gap: 8px; margin-top: 12px; }
    .btn-yes {
      flex: 1; padding: 9px 0;
      background: #d97706; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .btn-yes:hover { background: #b45309; }
    .btn-no {
      flex: 1; padding: 9px 0;
      background: none; color: #92400e;
      border: 1.5px solid #d97706; border-radius: 8px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-no:hover { background: #fef3c7; }

    /* ========= 検索結果カード ========= */
    .result-card {
      background: var(--white);
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }
    .result-title {
      font-size: 0.88rem; font-weight: 700;
      color: var(--sub); margin-bottom: 10px;
    }
    .ev-item {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .ev-item:last-child { border-bottom: none; }
    .ev-bar {
      width: 3px; border-radius: 3px; align-self: stretch; flex-shrink: 0;
      min-height: 36px;
    }
    .ev-bar.activity { background: #4A90E2; }
    .ev-bar.deadline { background: #E25C5C; }
    .ev-bar.block    { background: #E2A44A; }
    .ev-info { flex: 1; min-width: 0; }
    .ev-name {
      font-size: 0.88rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ev-time-str {
      font-size: 0.72rem; color: var(--sub); margin-top: 2px;
    }
    .ev-empty {
      text-align: center; padding: 20px 0;
      color: var(--sub); font-size: 0.85rem;
    }

    /* ========= 下部ナビ ========= */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: var(--nav-h);
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex; z-index: 200;
      box-shadow: 0 -2px 8px rgba(0,0,0,.06);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      text-decoration: none; color: var(--sub);
      font-size: 0.65rem; font-weight: 500;
      transition: color .15s;
    }
    .nav-item.active { color: var(--main); }
    .nav-icon { font-size: 1.25rem; line-height: 1; }
  </style>
</head>
<body>

<header class="hdr">
  <h1>予定入力</h1>
</header>

<main class="content">

  <!-- ===== 統合入力カード ===== -->
  <div class="card">
    <div class="card-header">
      <div class="card-icon">🤖</div>
      <div>
        <div class="card-title">AIアシスタント</div>
        <div class="card-desc">追加・検索・変更・削除を自然な言葉で</div>
      </div>
    </div>

    <div class="input-wrap">
      <textarea id="cmdInput" rows="3"
        placeholder="例: 明日18時から会議&#10;例: 今週の予定を教えて&#10;例: 3/4の会議を12時からに変更&#10;例: 明日の英語を削除して"></textarea>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="音声入力">🎤</button>
    </div>

    <div class="hint-grid">
      <div class="hint-chip">
        <span class="chip-label">➕ 追加</span>
        明日18時から会議<br>3/15 資料提出締切
      </div>
      <div class="hint-chip">
        <span class="chip-label">🔍 検索</span>
        今週の予定は？<br>来月の締切まとめて
      </div>
      <div class="hint-chip">
        <span class="chip-label">✏️ 変更</span>
        3/4の会議を12時から<br>合宿の終わりを3/10に
      </div>
      <div class="hint-chip">
        <span class="chip-label">🗑️ 削除</span>
        明日の英語を削除<br>3/15の締切を消して
      </div>
    </div>

    <div id="cmdMsg" class="msg"></div>

    <button class="btn-primary" id="cmdBtn" onclick="runCommand()">
      実行する
    </button>
  </div>

  <!-- ===== 検索結果表示エリア ===== -->
  <div id="searchResults" style="display:none;"></div>

</main>

<nav class="bottom-nav">
  <a href="/home/" class="nav-item">
    <span class="nav-icon">🏠</span><span>ホーム</span>
  </a>
  <a href="/input/" class="nav-item active">
    <span class="nav-icon">➕</span><span>入力</span>
  </a>
  <a href="/result/" class="nav-item">
    <span class="nav-icon">🔍</span><span>結果</span>
  </a>
  <a href="/account/" class="nav-item">
    <span class="nav-icon">👤</span><span>アカウント</span>
  </a>
</nav>

<script>
  const API_SCHEDULE = 'http://localhost:8000/api/schedule';
  const USER_ID      = 'user1';

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---- 音声入力 ----
  let recognition = null;
  let isListening = false;

  function toggleMic() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert('このブラウザは音声入力に対応していません。Chrome をお試しください。');
      return;
    }

    if (isListening) {
      recognition.stop();
      return;
    }

    recognition = new SpeechRecognition();
    recognition.lang        = 'ja-JP';
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;

    const micBtn = document.getElementById('micBtn');
    const textarea = document.getElementById('cmdInput');

    recognition.onstart = () => {
      isListening = true;
      micBtn.classList.add('active');
      micBtn.title = '音声認識中…（クリックで停止）';
    };

    recognition.onresult = (e) => {
      let transcript = '';
      for (let i = 0; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
      }
      textarea.value = transcript;
    };

    recognition.onend = () => {
      isListening = false;
      micBtn.classList.remove('active');
      micBtn.title = '音声入力';
    };

    recognition.onerror = (e) => {
      isListening = false;
      micBtn.classList.remove('active');
      micBtn.title = '音声入力';
      if (e.error !== 'no-speech') {
        showMsg('cmdMsg', 'error', `🎤 音声認識エラー: ${e.error}`);
      }
    };

    recognition.start();
  }

  // ---- 統合コマンド実行 ----
  async function runCommand() {
    const input = document.getElementById('cmdInput').value.trim();
    if (!input) {
      showMsg('cmdMsg', 'error', '入力内容を指定してください');
      return;
    }

    const btn = document.getElementById('cmdBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> AIが解析中…';
    showMsg('cmdMsg', 'loading', '<span class="spinner dark"></span> AIが解析中です…');
    document.getElementById('searchResults').style.display = 'none';

    try {
      const res  = await fetch(`${API_SCHEDULE}/command/`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ user_id: USER_ID, input }),
      });
      const data = await res.json();

      if (!res.ok || data.status === 'error') {
        throw new Error(data.message || '実行に失敗しました');
      }

      handleResponse(data, input);

    } catch (e) {
      showMsg('cmdMsg', 'error', `❌ ${esc(e.message)}`);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '実行する';
    }
  }

  function handleResponse(data, originalInput) {
    // 追加成功
    if (data.status === 'success' && data.action === 'add') {
      showMsg('cmdMsg', 'success', `✅ 「${esc(data.event?.title || '')}」を追加しました！`);
      document.getElementById('cmdInput').value = '';
      setTimeout(() => hideMsg('cmdMsg'), 4000);
      return;
    }

    // 検索結果
    if (data.status === 'success' && data.action === 'search') {
      showMsg('cmdMsg', 'success', `🔍 「${esc(data.period)}」の予定`);
      renderSearchResults(data.events || [], data.period);
      return;
    }

    // 変更・削除成功
    if (data.status === 'success' && (data.action === 'update' || data.action === 'delete')) {
      const icon = data.action === 'delete' ? '🗑️' : '✅';
      showMsg('cmdMsg', 'success', `${icon} ${esc(data.message)}`);
      document.getElementById('cmdInput').value = '';
      setTimeout(() => hideMsg('cmdMsg'), 5000);
      return;
    }

    // 時間重複
    if (data.status === 'conflict') {
      const lines = (data.conflicts || [])
        .map(c => `<div class="warn-item">🚫 ${esc(c.warning_message || c.title)}</div>`)
        .join('');
      showMsg('cmdMsg', 'error', `<strong>時間が重複する予定があります</strong><br>${lines}`);
      return;
    }

    // 警告（確認）
    if (data.status === 'warning') {
      window._pendingEvent = data.proposed_event;
      const lines = (data.warnings || [])
        .map(w => `<div class="warn-item">⚠️ ${esc(w.warning_message || w.title)}</div>`)
        .join('');
      showMsg('cmdMsg', 'warning',
        `${lines}<div class="warn-btns">
          <button class="btn-yes" onclick="forceAdd()">はい、追加する</button>
          <button class="btn-no"  onclick="cancelWarning()">キャンセル</button>
        </div>`
      );
      return;
    }

    // 複数マッチ
    if (data.status === 'multiple') {
      window._modifyIntent  = data.intent;
      window._modifyChanges = data.changes || {};

      const actionLbl = data.intent === 'delete' ? '削除' : '変更';
      let html = `<strong>🔍 ${esc(data.message)}</strong>`;
      html += `<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">`;
      data.events.forEach(ev => {
        const dt  = ev.start ? ev.start.slice(0, 10)  : '';
        const st  = ev.start ? ev.start.slice(11, 16) : '';
        const en  = ev.end   ? ev.end.slice(11, 16)   : '';
        const timeStr = ev.is_all_day ? '終日' : (st + (en ? `〜${en}` : ''));
        html += `<div style="display:flex;align-items:center;justify-content:space-between;
                             padding:8px 10px;background:#fff;border-radius:8px;
                             border:1px solid #e0e0e0;">
          <div>
            <div style="font-size:0.88rem;font-weight:600;">${esc(ev.title)}</div>
            <div style="font-size:0.72rem;color:#888;">${esc(dt)} ${esc(timeStr)}</div>
          </div>
          <button onclick="confirmModify(${ev.id})"
            style="padding:6px 12px;background:#0d9488;color:#fff;border:none;
                   border-radius:6px;font-size:0.8rem;font-weight:700;cursor:pointer;">
            ${actionLbl}
          </button>
        </div>`;
      });
      html += `</div>`;
      html += `<div style="margin-top:8px;text-align:right;">
        <button onclick="hideMsg('cmdMsg')"
          style="font-size:0.78rem;color:#888;background:none;border:none;cursor:pointer;">
          キャンセル
        </button>
      </div>`;
      showMsg('cmdMsg', 'warning', html);
      return;
    }

    // 見つからない
    if (data.status === 'not_found') {
      showMsg('cmdMsg', 'warning', `🔍 ${esc(data.message)}`);
      return;
    }

    // その他のエラー
    showMsg('cmdMsg', 'error', `❌ ${esc(data.message || '不明なエラーが発生しました')}`);
  }

  // ---- 検索結果レンダリング ----
  function renderSearchResults(events, period) {
    const container = document.getElementById('searchResults');
    if (events.length === 0) {
      container.innerHTML = `<div class="result-card">
        <div class="result-title">🔍 ${esc(period)} の予定</div>
        <div class="ev-empty">予定はありません</div>
      </div>`;
      container.style.display = 'block';
      return;
    }

    let html = `<div class="result-card">
      <div class="result-title">🔍 ${esc(period)} の予定（${events.length}件）</div>`;
    events.forEach(ev => {
      const dt  = ev.start ? ev.start.slice(0, 10)  : '';
      const st  = ev.start ? ev.start.slice(11, 16) : '';
      const en  = ev.end   ? ev.end.slice(11, 16)   : '';
      const timeStr = ev.is_all_day ? '終日' : (st + (en ? ` 〜 ${en}` : ''));
      html += `<div class="ev-item">
        <div class="ev-bar ${esc(ev.type || 'activity')}"></div>
        <div class="ev-info">
          <div class="ev-name">${esc(ev.title)}</div>
          <div class="ev-time-str">${esc(dt)} ${esc(timeStr)}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
    container.style.display = 'block';
  }

  // ---- 警告を無視して強制追加 ----
  async function forceAdd() {
    const eventData = window._pendingEvent;
    if (!eventData) return;

    const btn = document.getElementById('cmdBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> 追加中…';
    showMsg('cmdMsg', 'loading', '<span class="spinner dark"></span> 追加中…');

    try {
      const res  = await fetch(`${API_SCHEDULE}/command/`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ user_id: USER_ID, force_event: eventData }),
      });
      const data = await res.json();
      if (!res.ok || data.status === 'error') {
        throw new Error(data.message || '追加に失敗しました');
      }
      showMsg('cmdMsg', 'success', `✅ 「${esc(data.event?.title || '')}」を追加しました！`);
      document.getElementById('cmdInput').value = '';
      window._pendingEvent = null;
      setTimeout(() => hideMsg('cmdMsg'), 4000);
    } catch (e) {
      showMsg('cmdMsg', 'error', `❌ ${esc(e.message)}`);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '実行する';
    }
  }

  function cancelWarning() {
    window._pendingEvent = null;
    hideMsg('cmdMsg');
  }

  // ---- 複数マッチ確定 ----
  async function confirmModify(eventId) {
    showMsg('cmdMsg', 'loading', '<span class="spinner dark"></span> 実行中…');

    try {
      const res  = await fetch(`${API_SCHEDULE}/command/`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          user_id         : USER_ID,
          confirm_event_id: eventId,
          intent          : window._modifyIntent,
          changes         : window._modifyChanges,
        }),
      });
      const data = await res.json();

      if (!res.ok || data.status === 'error') {
        throw new Error(data.message || '操作に失敗しました');
      }

      const icon = data.action === 'delete' ? '🗑️' : '✅';
      showMsg('cmdMsg', 'success', `${icon} ${esc(data.message)}`);
      document.getElementById('cmdInput').value = '';
      window._modifyIntent  = null;
      window._modifyChanges = null;
      setTimeout(() => hideMsg('cmdMsg'), 5000);

    } catch (e) {
      showMsg('cmdMsg', 'error', `❌ ${esc(e.message)}`);
    }
  }

  // ---- メッセージ表示 ----
  function showMsg(id, type, html) {
    const el = document.getElementById(id);
    el.className = `msg ${type}`;
    el.innerHTML = html;
    el.style.display = 'block';
  }
  function hideMsg(id) {
    const el = document.getElementById(id);
    el.style.display = 'none';
  }
</script>
</body>
</html>
